name: Apply PR patch
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'codex/fix-login-speed-and-view-stability' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-login-speed-and-view-stability
      - run: |
          python tools/apply_login_fix_v2.py
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add api/records.py js/main.js
          git commit -m 'Fix slow login and preserve active view'
          git push

name: Apply account feature
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: github.head_ref == 'codex/account-and-finance-password' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/account-and-finance-password
      - env:
          PATCH_GZ: 
        run: |
          python - <<'PY'
          import base64,gzip,os
          open('/tmp/feature.patch','wb').write(gzip.decompress(base64.b64decode(os.environ['PATCH_GZ'])))
          PY
          git apply /tmp/feature.patch
          python -m unittest discover -s tests -v
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add api/service.py api/storage.py js/settings.js views/app-shell.html tests/test_service.py tests/test_static_structure.py
          git commit -m 'Add admin account and finance password management'
          git push

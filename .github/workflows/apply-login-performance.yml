name: Apply login performance fix
on:
  push:
    branches: [codex/render-current-view-only]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        env:
          PATCH_GZ_B64: 
        run: |
          echo "$PATCH_GZ_B64" | base64 -d | gunzip > /tmp/performance.patch
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git am /tmp/performance.patch
          python -m unittest discover -s tests -v
          git rm .github/workflows/apply-login-performance.yml
          git commit --amend --no-edit
          git push origin HEAD:codex/render-current-view-only

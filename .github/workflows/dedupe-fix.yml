name: Dedupe fix
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  fix:
    if: github.head_ref == 'codex/fix-login-speed-and-view-stability' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-login-speed-and-view-stability
      - run: |
          python - <<'PY'
          from pathlib import Path
          for path, line in [('api/records.py','RECORD_STORAGE_INIT_LOCK = Lock()\nRECORD_STORAGE_READY = False\n'),('js/main.js',"let activeViewId = 'loginView';\n")]:
              p=Path(path);s=p.read_text();p.write_text(s.replace(line+line,line))
          PY
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add api/records.py js/main.js
          git commit -m 'Remove duplicate declarations'
          git push

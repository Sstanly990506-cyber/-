<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>上光廠內部系統</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="loginView" class="panel card">
        <h1>XX 上光公司內部系統</h1>
        <p class="sub">請先登入系統</p>
        <form id="loginForm" class="form-grid compact">
          <label>帳號<input id="username" required /></label>
          <label>密碼<input id="password" type="password" required /></label>
          <button class="btn primary" type="submit">登入</button>
        </form>
      </section>

      <section id="dashboardView" class="panel hidden">
        <header class="topbar card">
          <h2>功能導航</h2>
          <div>
            <span id="welcomeText"></span>
            <button id="logoutBtn" class="btn ghost" type="button">登出</button>
          </div>
        </header>
        <div class="card-grid">
          <button class="nav-card" type="button" data-target="ordersView">工單作業系統</button>
          <button class="nav-card" type="button" data-target="customersView">客戶資料系統</button>
          <button class="nav-card" type="button" data-target="financeView">財經資料系統</button>
        </div>
      </section>

      <section id="ordersView" class="panel hidden">
        <header class="topbar card">
          <h2>工單作業系統</h2>
        </header>

        <div class="orders-layout">
          <aside class="card side-menu">
            <button class="btn side-btn active" type="button" data-order-screen="list">工單列表</button>
            <button class="btn side-btn" type="button" data-order-screen="form">新增工單</button>
            <button class="btn side-btn" type="button" data-back>返回導航</button>
          </aside>

          <article id="ordersListScreen" class="card">
            <h3>工單列表</h3>
            <div class="filter-row">
              <button class="btn filter-btn active" data-status-filter="全部" type="button">全部</button>
              <button class="btn filter-btn" data-status-filter="未完成" type="button">未完成</button>
              <button class="btn filter-btn" data-status-filter="已送出" type="button">已送出</button>
              <button class="btn filter-btn" data-status-filter="已完成" type="button">已完成</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>工單編號</th><th>日期</th><th>上游</th><th>下游</th><th>總價</th><th>狀態</th><th></th></tr></thead>
                <tbody id="ordersTbody"></tbody>
              </table>
            </div>
          </article>

          <article id="ordersFormScreen" class="card hidden">
            <h3>新增 / 編輯工單</h3>
            <form id="orderForm" class="form-grid">
              <input id="orderId" type="hidden" />
              <label>工單編號<input id="orderNumber" required /></label>
              <label>日期<input id="orderDate" type="date" required /></label>

              <label>上游客戶（可搜尋）
                <input id="upstreamInput" list="upstreamOptions" placeholder="輸入關鍵字，例如：彩" required />
                <datalist id="upstreamOptions"></datalist>
              </label>

              <label>下游客戶（可搜尋）
                <input id="downstreamInput" list="downstreamOptions" placeholder="輸入關鍵字，例如：彩" required />
                <datalist id="downstreamOptions"></datalist>
              </label>

              <label>張數<input id="sheetCount" type="number" min="1" required /></label>
              <label>長<input id="sizeLength" type="number" step="0.01" min="0" required /></label>
              <label>寬<input id="sizeWidth" type="number" step="0.01" min="0" required /></label>
              <label>單位
                <select id="sizeUnit" required>
                  <option value="mm">mm</option>
                  <option value="cm">cm</option>
                  <option value="inch">inch</option>
                </select>
              </label>
              <label>上光種類
                <div class="row">
                  <select id="glossType" required></select>
                  <input id="newGlossType" placeholder="新增種類" />
                  <button type="button" id="addGlossBtn" class="btn">加入</button>
                </div>
              </label>
              <label>總價<input id="totalPrice" type="number" step="0.01" min="0" required /></label>
              <label>狀態
                <select id="orderStatus" required>
                  <option value="未完成">未完成</option>
                  <option value="已送出">已送出</option>
                  <option value="已完成">已完成</option>
                </select>
              </label>
              <div class="actions">
                <button class="btn primary" type="submit">儲存工單</button>
                <button class="btn" type="button" id="clearOrderBtn">清空</button>
              </div>
            </form>
          </article>
        </div>
      </section>

      <section id="customersView" class="panel hidden">
        <header class="topbar card">
          <h2>客戶資料系統</h2>
          <button class="btn" data-back>返回導航</button>
        </header>
        <div class="split">
          <article class="card">
            <h3>新增客戶</h3>
            <form id="customerForm" class="form-grid compact">
              <label>客戶名稱<input id="customerName" required /></label>
              <label>電話<input id="customerPhone" /></label>
              <label>地址<input id="customerAddress" /></label>
              <label>角色
                <select id="customerRole" required>
                  <option value="上游">上游</option>
                  <option value="下游">下游</option>
                  <option value="兩者">兩者</option>
                </select>
              </label>
              <button class="btn primary" type="submit">新增客戶</button>
            </form>
          </article>
          <article class="card">
            <h3>客戶清單（可搜尋 / 可停用）</h3>
            <input id="customerSearch" placeholder="搜尋客戶名稱、電話、地址" />
            <div class="table-wrap">
              <table>
                <thead><tr><th>名稱</th><th>電話</th><th>地址</th><th>角色</th><th>狀態</th><th></th></tr></thead>
                <tbody id="customersTbody"></tbody>
              </table>
            </div>
          </article>
        </div>
      </section>

      <section id="financeView" class="panel hidden">
        <header class="topbar card">
          <h2>財經資料系統</h2>
          <button class="btn" data-back>返回導航</button>
        </header>
        <article class="card">
          <p>財經系統入口已啟用二次密碼保護。</p>
          <p>（示範頁）後續可放：收支報表、應收應付、毛利分析。</p>
        </article>
      </section>

      <section id="auditView" class="panel hidden">
        <header class="topbar card">
          <h2>總價修改稽核</h2>
          <button class="btn" data-back>返回導航</button>
        </header>
        <article class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th>工單</th><th>欄位</th><th>修改前</th><th>修改後</th><th>時間</th><th>操作者</th><th>裝置/IP</th></tr></thead>
              <tbody id="auditTbody"></tbody>
            </table>
          </div>
        </article>
      </section>
    </main>

    <dialog id="financeDialog">
      <form id="financeForm" method="dialog" class="card form-grid compact">
        <h3>請輸入財經系統密碼</h3>
        <label>密碼<input id="financePassword" type="password" required /></label>
        <menu>
          <button class="btn" value="cancel" type="button" id="cancelFinanceBtn">取消</button>
          <button class="btn primary" value="default" type="submit">確認</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
